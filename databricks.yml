bundle:
  name: medtech_hybrid_classifier

workspace:
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

variables:
  catalog:
    description: Unity Catalog name
    default: serverless_stable_m3qkky_catalog
  schema:
    description: Schema name
    default: medtech_hybrid_classifier

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://fevm-serverless-stable-m3qkky.cloud.databricks.com
